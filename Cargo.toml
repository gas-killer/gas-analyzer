[package]
name = "gas-analyzer-rs"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
alloy = { version = "1.0.37", features = [
    "sol-types",
    "contract",
    "rpc",
    "rpc-types",
    "node-bindings",
    "json-rpc",
] }
alloy-dyn-abi = "1.0.37"
alloy-eips = "1.0.37"
alloy-provider = { version = "1.0.37", features = ["debug-api"] }
alloy-rpc-types = { version = "1.0.37", features = ["trace"] }
alloy-sol-types = "1.0.37"
anyhow = "1.0.98"
chrono = { version = "0.4.41", features = ["clock", "serde"] }
clap = "4.5.40"
clap_derive = "4.5.32"
colored = "3.0.0"
csv = "1.3.1"
dotenv = "0.15.0"
env = "1.0.1"
serde = { version = "1.0.219", features = ["derive"] }
serde_json = "1.0"
url = "2.5.4"
hex = "0.4"

# Native-only dependencies (optional, not needed for WASM)
# Note: foundry-evm-traces has complex native dependencies that cannot be compiled to WASM.
foundry-evm-traces = { git = "https://github.com/foundry-rs/foundry", package = "foundry-evm-traces", branch = "master", optional = true }
tokio = { version = "1.45.1", features = ["rt-multi-thread"], optional = true }

# opcode-tracer for EVM trace analysis
opcode-tracer = { git = "https://github.com/BreadchainCoop/sp1-contract-call", branch = "cancun-v1", package = "opcode-tracer", optional = true }

[features]
# Default includes all native dependencies for full functionality
default = ["native-deps"]
# Enable native dependencies (foundry-evm-traces, opcode-tracer, tokio)
# Disable with --no-default-features for WASM builds
native-deps = ["foundry-evm-traces", "opcode-tracer", "tokio"]

# WASM dependencies
[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
js-sys = "0.3"
web-sys = { version = "0.3", features = [
    "Request",
    "RequestInit",
    "RequestMode",
    "Response",
    "Window",
    "Headers",
] }
console_error_panic_hook = "0.1"
console_log = "1.0"
log = "0.4"
getrandom = { version = "0.2", features = ["js"] }

[build-dependencies]
serde_json = "1.0"

[[example]]
name = "run_tx_extractor_example"
path = "examples/tx-extractor/run_tx_extractor_example.rs"

[profile.release]
opt-level = "z"   # Optimize for size
lto = true        # Enable link-time optimization
codegen-units = 1 # Better optimization
panic = "abort"   # Smaller binary size
